<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Barbershop tools</title>
  <desc id="desc">Premium barber tools on a dark wooden counter.</desc>
  <defs>
    <linearGradient id="wood" x1="0" x2="1">
      <stop offset="0" stop-color="#090705"/>
      <stop offset="0.36" stop-color="#231a10"/>
      <stop offset="0.72" stop-color="#10100d"/>
      <stop offset="1" stop-color="#050504"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#faf6ec"/>
      <stop offset="0.35" stop-color="#7f817d"/>
      <stop offset="0.72" stop-color="#eeeeea"/>
      <stop offset="1" stop-color="#343431"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" x2="1">
      <stop offset="0" stop-color="#75511f"/>
      <stop offset="0.54" stop-color="#d0a45b"/>
      <stop offset="1" stop-color="#8a612b"/>
    </linearGradient>
    <filter id="shadow">
